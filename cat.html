<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Котик</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0d7c6;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            background: #16213e;
            border: 1px solid #e2a76f;
            border-radius: 16px;
            padding: 2.5rem 3rem;
            text-align: center;
            box-shadow: 0 0 40px rgba(226, 167, 111, 0.15);
            max-width: 580px;
            width: 100%;
        }
        pre.ascii-cat {
            color: #e2a76f;
            font-size: 11px;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            user-select: none;
        }
        .greeting {
            font-size: 1.6rem;
            color: #f4a261;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #8a9bb5;
            font-size: 0.95rem;
        }
        .paw {
            display: inline-block;
            animation: wave 1.2s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(12deg); }
            75% { transform: rotate(-8deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <pre class="ascii-cat">
      ╱|、
     (˚ˎ 。7
      |、˜〵
      じしˍ,)ノ
        </pre>

        <pre class="ascii-cat">
        /\_/\
       ( o.o )
        > ^ <
        </pre>

        <div class="greeting">
            Привет! <span class="paw">🐾</span>
        </div>
        <p class="sub">Этот котик передаёт тебе мурчащий привет.</p>
    </div>
</body>
</html>
